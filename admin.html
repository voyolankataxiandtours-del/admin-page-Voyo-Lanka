<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voyo Lanka Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex">

<!-- SIDEBAR -->
<div class="w-64 h-screen bg-black text-white p-5 fixed">

  <h1 class="text-xl font-bold mb-8">Voyo Admin</h1>

  <nav class="space-y-3 text-sm">
    <p class="text-gray-400">MENU</p>
    <a href="#" class="block hover:text-yellow-300">Dashboard</a>
    <a href="#form" class="block hover:text-yellow-300">Add Tour</a>
    <a href="#list" class="block hover:text-yellow-300">Manage Tours</a>
  </nav>

</div>

<!-- MAIN -->
<div class="ml-64 flex-1 p-6">

<!-- TOP BAR -->
<div class="flex justify-between items-center mb-6">
  <h2 class="text-2xl font-bold">Tour Management</h2>
  <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">
    Logout
  </button>
</div>

<!-- FORM -->
<div id="form" class="bg-white p-6 rounded-xl shadow mb-6">

  <h3 class="font-bold mb-4">Add / Edit Tour</h3>

  <input id="docId" placeholder="Document ID (auto)" class="border p-2 w-full mb-2">

  <input id="title" placeholder="Tour Title" class="border p-2 w-full mb-2">

  <textarea id="description" placeholder="Description" class="border p-2 w-full mb-2"></textarea>

  <select id="category" class="border p-2 w-full mb-2">
    <option value="day">Day Tour</option>
    <option value="round">Round Tour</option>
    <option value="tailor">Tailor Made</option>
  </select>

  <input id="slug" placeholder="Slug (kandy-tour)" class="border p-2 w-full mb-2">

  <!-- IMAGE UPLOAD -->
  <input type="file" id="imageFile" class="mb-2">

  <button onclick="uploadImage()" class="bg-blue-600 text-white px-4 py-2 rounded">
    Upload Image
  </button>

  <p id="uploadStatus" class="text-green-600 text-sm mt-2"></p>

  <button onclick="saveTour()" class="mt-4 bg-black text-white px-4 py-2 rounded w-full">
    Save Tour
  </button>

</div>

<!-- LIST -->
<div id="list" class="bg-white p-6 rounded-xl shadow">

  <h3 class="font-bold mb-4">All Tours</h3>

  <div id="tourList" class="space-y-3"></div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "admin-login.html";
  }
});
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
    authDomain: "voyo-lanka.firebaseapp.com",
    projectId: "voyo-lanka"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let imageURL = "";

/* IMAGE UPLOAD */
window.uploadImage = async function () {
  const file = imageFile.files[0];

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "YOUR_PRESET");

  const res = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  imageURL = data.secure_url;

  uploadStatus.innerText = "Image uploaded ✔";
};

/* SAVE TOUR */
window.saveTour = async function () {
  const data = {
    title: title.value,
    description: description.value,
    category: category.value,
    slug: slug.value,
    image: imageURL
  };

  if (docId.value) {
    await updateDoc(doc(db, "tour", docId.value), data);
  } else {
    await addDoc(collection(db, "tour"), data);
  }

  loadTours();
};

/* LOAD TOURS */
async function loadTours() {
  tourList.innerHTML = "";

  const snap = await getDocs(collection(db, "tour"));

  snap.forEach(d => {
    const t = d.data();

    const card = document.createElement("div");
    card.className = "flex justify-between items-center border p-3 rounded";

    card.innerHTML = `
      <div>
        <p class="font-bold">${t.title}</p>
        <p class="text-xs text-gray-500">${t.category}</p>
      </div>

      <div class="flex gap-2">
        <button onclick="editTour('${d.id}', '${t.title}', \`${t.description}\`, '${t.image}', '${t.slug}', '${t.category}')"
        class="bg-blue-500 text-white px-3 py-1 rounded">Edit</button>

        <button onclick="deleteTour('${d.id}')"
        class="bg-red-500 text-white px-3 py-1 rounded">Delete</button>
      </div>
    `;

    tourList.appendChild(card);
  });
}

/* DELETE */
window.deleteTour = async function(id) {
  await deleteDoc(doc(db, "tour", id));
  loadTours();
};

/* EDIT */
window.editTour = function(id, t, d, img, s, c) {
  docId.value = id;
  title.value = t;
  description.value = d;
  slug.value = s;
  category.value = c;
  imageURL = img;
};

/* LOGOUT */
window.logout = async function () {
  await signOut(auth);
  window.location.href = "admin-login.html";
};

loadTours();
</script>

</body>
</html>

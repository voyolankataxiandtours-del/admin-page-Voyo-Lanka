<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="bg-black text-white p-4 flex justify-between">
  <h1>Tour Admin Panel</h1>
  <button onclick="logout()">Logout</button>
</div>

<div class="max-w-4xl mx-auto p-6">

<!-- FORM -->
<div class="bg-white p-5 rounded-xl shadow mb-6">

  <input id="docId" placeholder="Edit ID (optional)" class="border p-2 w-full mb-2">

  <input id="title" placeholder="Title" class="border p-2 w-full mb-2">

  <textarea id="description" placeholder="Description" class="border p-2 w-full mb-2"></textarea>

  <select id="category" class="border p-2 w-full mb-2">
    <option value="day">Day Tour</option>
    <option value="round">Round Tour</option>
    <option value="tailor">Tailor Made</option>
  </select>

  <input id="slug" placeholder="Slug" class="border p-2 w-full mb-2">

  <input type="file" id="imageFile" class="mb-2">

  <button onclick="uploadImage()" class="bg-blue-500 text-white px-4 py-2 rounded">
    Upload Image
  </button>

  <p id="status" class="text-green-600 text-sm"></p>

  <button onclick="saveTour()" class="mt-4 bg-black text-white w-full py-2 rounded">
    Save Tour
  </button>

</div>

<!-- LIST -->
<div class="bg-white p-5 rounded-xl shadow">
  <div id="list"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
    authDomain: "voyo-lanka.firebaseapp.com",
    projectId: "voyo-lanka"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let imageURL = "";

/* 🔐 LOGIN GUARD */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "admin-login.html";
  }
});

/* UPLOAD IMAGE */
window.uploadImage = async function () {
  const file = imageFile.files[0];

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "YOUR_PRESET");

  const res = await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  imageURL = data.secure_url;

  status.innerText = "Image uploaded ✔";
};

/* SAVE */
window.saveTour = async function () {
  const data = {
    title: title.value,
    description: description.value,
    category: category.value,
    slug: slug.value,
    image: imageURL
  };

  if (docId.value) {
    await updateDoc(doc(db, "tour", docId.value), data);
  } else {
    await addDoc(collection(db, "tour"), data);
  }

  loadTours();
};

/* LOAD */
async function loadTours() {
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "tour"));

  snap.forEach(d => {
    const t = d.data();

    const div = document.createElement("div");
    div.className = "flex justify-between border p-3 mb-2 rounded";

    div.innerHTML = `
      <div>
        <b>${t.title}</b><br>
        <small>${t.category}</small>
      </div>

      <div class="flex gap-2">
        <button onclick="editTour('${d.id}', '${t.title}', \`${t.description}\`, '${t.image}', '${t.slug}', '${t.category}')"
        class="bg-blue-500 text-white px-2 rounded">Edit</button>

        <button onclick="deleteTour('${d.id}')"
        class="bg-red-500 text-white px-2 rounded">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

window.deleteTour = async function(id) {
  await deleteDoc(doc(db, "tour", id));
  loadTours();
};

window.editTour = function(id, t, d, img, s, c) {
  docId.value = id;
  title.value = t;
  description.value = d;
  slug.value = s;
  category.value = c;
  imageURL = img;
};

window.logout = async function () {
  await signOut(auth);
  window.location.href = "admin-login.html";
};

loadTours();
</script>

</body>
</html>

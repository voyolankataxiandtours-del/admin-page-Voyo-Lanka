<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voyo Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');">

<!-- DARK OVERLAY -->
<div class="min-h-screen bg-black/70 flex text-white">

<!-- SIDEBAR -->
<aside class="w-64 bg-black/60 backdrop-blur-md p-6 flex flex-col justify-between">

  <div>
    <h1 class="text-2xl font-bold mb-8">Voyo Admin</h1>

    <nav class="space-y-3 text-sm">
      <a href="#" class="block hover:text-yellow-300">📊 Dashboard</a>
      <a href="#form" class="block hover:text-yellow-300">➕ Add Tour</a>
      <a href="#list" class="block hover:text-yellow-300">📁 Manage Tours</a>
    </nav>
  </div>

  <button onclick="logout()" class="text-red-400 hover:text-red-200 text-sm">
    🚪 Logout
  </button>

</aside>

<!-- MAIN -->
<main class="flex-1 p-8 overflow-y-auto">

  <!-- HEADER -->
  <div class="mb-6">
    <h2 class="text-3xl font-bold">Tour Management</h2>
    <p class="text-gray-300 text-sm">Manage your tours, images and categories</p>
  </div>

  <!-- FORM CARD -->
  <section id="form" class="bg-white/10 backdrop-blur-xl border border-white/20 p-6 rounded-2xl shadow-lg mb-8">

    <h3 class="text-lg font-semibold mb-4">Add / Edit Tour</h3>

    <input id="docId" placeholder="Edit ID (optional)" class="w-full p-2 mb-2 rounded bg-white/90 text-black">

    <input id="title" placeholder="Tour Title" class="w-full p-2 mb-2 rounded bg-white/90 text-black">

    <textarea id="description" placeholder="Description" class="w-full p-2 mb-2 rounded bg-white/90 text-black"></textarea>

    <select id="category" class="w-full p-2 mb-2 rounded bg-white/90 text-black">
      <option value="day">Day Tour</option>
      <option value="round">Round Tour</option>
      <option value="tailor">Tailor Made</option>
    </select>

    <input id="slug" placeholder="Slug (e.g. kandy-tour)" class="w-full p-2 mb-2 rounded bg-white/90 text-black">

    <input type="file" id="imageFile" class="mb-3 text-sm">

    <button onclick="uploadImage()" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-semibold">
      Upload Image
    </button>

    <p id="status" class="text-green-400 text-sm mt-2"></p>

    <button onclick="saveTour()" class="w-full mt-4 bg-black hover:bg-gray-900 py-2 rounded font-semibold border border-white/20">
      Save Tour
    </button>

  </section>

  <!-- LIST -->
  <section id="list" class="bg-white/10 backdrop-blur-xl border border-white/20 p-6 rounded-2xl shadow-lg">

    <h3 class="text-lg font-semibold mb-4">All Tours</h3>

    <div id="tourList" class="space-y-3"></div>

  </section>

</main>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
  authDomain: "voyo-lanka.firebaseapp.com",
  projectId: "voyo-lanka"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let imageURL = "";

/* AUTH GUARD */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./index.html";
  }
});

/* UPLOAD IMAGE */
window.uploadImage = async function () {
  const file = imageFile.files[0];

  if (!file) return alert("Select image first");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "tour_upload");

  const res = await fetch(
    "https://api.cloudinary.com/v1_1/dtbxzd7ux/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  if (!data.secure_url) {
    console.log(data);
    alert("Upload failed");
    return;
  }

  imageURL = data.secure_url;
  document.getElementById("status").innerText = "Image uploaded ✔";
};

/* SAVE */
window.saveTour = async function () {
  const data = {
    title: title.value,
    description: description.value,
    category: category.value,
    slug: slug.value,
    image: imageURL
  };

  if (docId.value) {
    await updateDoc(doc(db, "tour", docId.value), data);
  } else {
    await addDoc(collection(db, "tour"), data);
  }

  loadTours();
};

/* LOAD */
async function loadTours() {
  tourList.innerHTML = "";

  const snap = await getDocs(collection(db, "tour"));

  snap.forEach(d => {
    const t = d.data();

    const card = document.createElement("div");
    card.className = "flex justify-between items-center bg-white/20 p-3 rounded-lg border border-white/10";

    card.innerHTML = `
      <div>
        <p class="font-bold">${t.title}</p>
        <p class="text-xs text-gray-300">${t.category}</p>
      </div>

      <div class="flex gap-2">
        <button onclick="editTour('${d.id}', '${t.title}', \`${t.description}\`, '${t.image}', '${t.slug}', '${t.category}')"
        class="bg-blue-500 px-3 py-1 rounded text-sm">Edit</button>

        <button onclick="deleteTour('${d.id}')"
        class="bg-red-500 px-3 py-1 rounded text-sm">Delete</button>
      </div>
    `;

    tourList.appendChild(card);
  });
}

window.deleteTour = async function(id) {
  await deleteDoc(doc(db, "tour", id));
  loadTours();
};

window.editTour = function(id, t, d, img, s, c) {
  docId.value = id;
  title.value = t;
  description.value = d;
  slug.value = s;
  category.value = c;
  imageURL = img;
};

window.logout = async function () {
  await signOut(auth);
  window.location.href = "./index.html";
};

loadTours();
</script>

</body>
</html>

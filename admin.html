<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: white;
}

.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.1);
}

.card {
  transition: .4s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,.4);
}

.preview {
  border: 1px dashed rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- TOP BAR -->
<header class="flex justify-between items-center px-6 py-4 glass">
  <h1 class="font-bold">Tour Admin Panel</h1>

  <button onclick="logout()" class="bg-white text-black px-4 py-2 rounded">
    Logout
  </button>
</header>

<!-- MAIN -->
<div class="max-w-6xl mx-auto p-6 grid lg:grid-cols-2 gap-6">

<!-- FORM -->
<div class="glass rounded-2xl p-6">

  <h2 class="text-xl font-bold mb-4">Create / Edit Tour</h2>

  <input id="docId" placeholder="Edit ID (optional)"
    class="w-full mb-3 p-3 rounded bg-white/10 outline-none">

  <input id="title" placeholder="Title"
    class="w-full mb-3 p-3 rounded bg-white/10 outline-none">

  <textarea id="description" placeholder="Description"
    class="w-full mb-3 p-3 rounded bg-white/10 outline-none"></textarea>

  <select id="category"
    class="w-full mb-3 p-3 rounded bg-white/10 outline-none text-black">
    <option value="Day Tour">Day Tour</option>
    <option value="Round Tour">Round Tour</option>
    <option value="Tailor Made">Tailor Made</option>
  </select>

  <input id="slug" placeholder="Slug"
    class="w-full mb-3 p-3 rounded bg-white/10 outline-none">

  <!-- IMAGE UPLOAD -->
  <input type="file" id="imageFile" class="mb-3">

  <button onclick="uploadImage()"
    class="w-full bg-blue-500 py-2 rounded font-bold">
    Upload Image
  </button>

  <p id="status" class="text-green-400 text-sm mt-2"></p>

  <!-- PREVIEW -->
  <div class="mt-4 preview rounded-xl overflow-hidden h-48 flex items-center justify-center">
    <img id="previewImg" class="hidden w-full h-full object-cover"/>
    <p id="noPreview" class="text-sm text-white/50">Image preview will appear here</p>
  </div>

  <button onclick="saveTour()"
    class="w-full mt-4 bg-white text-black py-3 rounded font-bold">
    Save Tour
  </button>

</div>

<!-- LIST -->
<div class="glass rounded-2xl p-6">

  <h2 class="text-xl font-bold mb-4">All Tours</h2>

  <div id="list" class="space-y-4"></div>

</div>

</div>

<script type="module">

  window.history.pushState(null, "", window.location.href);

window.addEventListener("popstate", () => {
  window.location.replace("./index.html");
});

  onAuthStateChanged(auth, (user) => {
  if (!user) {
    // stops back button restore
    window.location.replace("./index.html");
  }
});

  window.logout = async () => {
  await signOut(auth);

  // clear history + force redirect
  window.location.replace("./index.html");
};
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
    authDomain: "voyo-lanka.firebaseapp.com",
    projectId: "voyo-lanka"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let imageURL = "";

/* AUTH GUARD */
onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "./index.html";
});

/* IMAGE UPLOAD */
window.uploadImage = async function () {
  const file = imageFile.files[0];
  if (!file) return alert("Select image");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "tour_upload");

  const res = await fetch("https://api.cloudinary.com/v1_1/dtbxzd7ux/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (!data.secure_url) return alert("Upload failed");

  imageURL = data.secure_url;

  status.innerText = "Uploaded ✔";

  // LIVE PREVIEW
  previewImg.src = imageURL;
  previewImg.classList.remove("hidden");
  noPreview.style.display = "none";
};

/* SAVE */
window.saveTour = async function () {
  const data = {
    title: title.value,
    description: description.value,
    category: category.value,
    slug: slug.value,
    image: imageURL
  };

  if (docId.value) {
    await updateDoc(doc(db, "tour", docId.value), data);
  } else {
    await addDoc(collection(db, "tour"), data);
  }

  loadTours();
};

/* LOAD */
async function loadTours() {
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "tour"));

  snap.forEach(d => {
    const t = d.data();

    const div = document.createElement("div");
    div.className = "card bg-white/10 p-3 rounded-xl";

    div.innerHTML = `
      <img src="${t.image}" class="h-32 w-full object-cover rounded-lg mb-2"/>

      <h3 class="font-bold">${t.title}</h3>
      <p class="text-sm text-white/60">${t.category}</p>

      <div class="flex gap-2 mt-2">
        <button onclick="editTour('${d.id}', '${t.title}', \`${t.description}\`, '${t.image}', '${t.slug}', '${t.category}')"
          class="bg-blue-500 px-3 py-1 rounded">Edit</button>

        <button onclick="deleteTour('${d.id}')"
          class="bg-red-500 px-3 py-1 rounded">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
}

window.deleteTour = async (id) => {
  await deleteDoc(doc(db, "tour", id));
  loadTours();
};

window.editTour = (id, t, d, img, s, c) => {
  docId.value = id;
  title.value = t;
  description.value = d;
  slug.value = s;
  category.value = c;

  imageURL = img;

  previewImg.src = img;
  previewImg.classList.remove("hidden");
  noPreview.style.display = "none";
};

window.logout = async () => {
  await signOut(auth);
  window.location.href = "./index.html";
};

loadTours();
</script>

</body>
</html>

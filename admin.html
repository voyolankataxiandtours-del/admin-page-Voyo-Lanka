<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: white;
  font-family: system-ui;
}

.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.1);
}

.card {
  transition: .3s ease;
}
.card:hover {
  transform: translateY(-6px);
}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div class="w-56 h-screen glass p-4 hidden md:block">
  <h1 class="font-bold mb-6">Admin Panel</h1>

  <button onclick="showSection('dashboard')" class="block w-full text-left mb-2">📊 Dashboard</button>
  <button onclick="showSection('tours')" class="block w-full text-left mb-2">🧳 Tours</button>
  <button onclick="newTour()" class="block w-full text-left mb-2 text-green-400">➕ Add New Tour</button>

  <hr class="my-4 border-white/10"/>

  <button onclick="logout()" class="bg-red-500 w-full py-2 rounded">Logout</button>
</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<!-- TOP BAR -->
<div class="glass flex justify-between items-center p-4 rounded-xl mb-4">
  <h1 class="font-bold">Dashboard</h1>

  <button onclick="newTour()" class="bg-green-500 px-3 py-1 rounded">
    + Add Tour
  </button>
</div>

<!-- DASHBOARD -->
<div id="dashboardSection">

  <div class="glass p-4 rounded-xl w-48 mb-4">
    <p class="text-sm opacity-60">Total Tours</p>
    <h2 id="totalTours" class="text-2xl font-bold">0</h2>
  </div>

  <h2 class="mb-2 font-bold">Recent Tours</h2>
  <div id="recentTours" class="grid md:grid-cols-3 gap-3"></div>
</div>

<!-- TOURS -->
<div id="toursSection" class="hidden grid md:grid-cols-2 gap-6">

<!-- FORM -->
<div class="glass p-4 rounded-xl">

  <h2 class="font-bold mb-3">Add / Edit Tour</h2>

  <input id="docId" placeholder="ID" class="w-full mb-2 p-2 bg-white/10 rounded">
  <input id="title" placeholder="Title" class="w-full mb-2 p-2 bg-white/10 rounded">
  <textarea id="description" placeholder="Description" class="w-full mb-2 p-2 bg-white/10 rounded"></textarea>

  <select id="category" class="w-full mb-2 p-2 bg-white/10 text-black rounded">
    <option>Day Tour</option>
    <option>Round Tour</option>
    <option>Tailor Made</option>
  </select>

  <input id="slug" placeholder="Slug" class="w-full mb-2 p-2 bg-white/10 rounded">

  <input type="file" id="imageFile" class="mb-2">

  <button onclick="uploadImage()" class="bg-blue-500 w-full py-2 rounded">
    Upload Image
  </button>

  <p id="status" class="text-green-400 text-sm mt-2"></p>

  <div class="h-40 mt-3 bg-white/5 flex items-center justify-center rounded overflow-hidden">
    <img id="previewImg" class="hidden w-full h-full object-cover"/>
    <span id="noPreview" class="text-white/40">Preview</span>
  </div>

  <button onclick="saveTour()" class="bg-white text-black w-full mt-3 py-2 rounded font-bold">
    Save Tour
  </button>

</div>

<!-- LIST -->
<div id="list" class="space-y-3"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
  authDomain: "voyo-lanka.firebaseapp.com",
  projectId: "voyo-lanka"
});

const db = getFirestore(app);
const auth = getAuth(app);

let imageURL = "";

/* SAFE SELECTOR */
const $ = (id) => document.getElementById(id);

/* AUTH GUARD */
onAuthStateChanged(auth, (user) => {
  if (!user) location.replace("index.html");
});

/* BACK BUTTON LOCK */
history.pushState(null, "", location.href);
onpopstate = () => location.replace("index.html");

/* TOAST */
function toast(msg) {
  const t = $("status");
  if (t) t.innerText = msg;
}

/* RESET FORM */
window.newTour = () => {
  $("docId").value = "";
  $("title").value = "";
  $("description").value = "";
  $("slug").value = "";
  $("category").value = "Day Tour";

  imageURL = "";

  $("status").innerText = "";

  $("previewImg").classList.add("hidden");
  $("noPreview").style.display = "block";
};

/* CLOUDINARY UPLOAD */
window.uploadImage = async () => {
  const file = $("imageFile").files[0];
  if (!file) return alert("Select image first");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "tour_upload");

  try {
    const res = await fetch(
      "https://api.cloudinary.com/v1_1/dtbxzd7ux/image/upload",
      { method: "POST", body: formData }
    );

    const data = await res.json();

    if (!data.secure_url) {
      alert("Upload failed");
      return;
    }

    imageURL = data.secure_url;

    $("status").innerText = "Uploaded ✔";
    $("previewImg").src = imageURL;
    $("previewImg").classList.remove("hidden");
    $("noPreview").style.display = "none";

  } catch (err) {
    alert("Upload error");
  }
};

/* SAVE TOUR (FIXED) */
window.saveTour = async () => {
  const data = {
    title: $("title").value,
    description: $("description").value,
    category: $("category").value,
    slug: $("slug").value,
    image: imageURL
  };

  const id = $("docId").value;

  try {
    if (id) {
      // SAFE UPDATE (no crash if missing)
      await setDoc(doc(db, "tour", id), data, { merge: true });
    } else {
      await addDoc(collection(db, "tour"), data);
    }

    newTour();
    loadTours();

  } catch (e) {
    console.error(e);
    alert("Save failed");
  }
};

/* LOAD TOURS */
async function loadTours() {
  const list = $("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "tour"));

  snap.forEach(d => {
    const t = d.data();

    list.innerHTML += `
      <div class="glass p-3 rounded-xl">
        <img src="${t.image}" class="h-28 w-full object-cover rounded mb-2"/>

        <b>${t.title}</b>
        <p class="text-sm opacity-60">${t.category}</p>

        <div class="flex gap-2 mt-2">
          <button onclick="editTour('${d.id}','${t.title}','${t.description}','${t.image}','${t.slug}','${t.category}')"
          class="bg-blue-500 px-3 py-1 rounded">Edit</button>

          <button onclick="deleteTour('${d.id}')"
          class="bg-red-500 px-3 py-1 rounded">Delete</button>
        </div>
      </div>
    `;
  });
}

/* DELETE */
window.deleteTour = async (id) => {
  await deleteDoc(doc(db, "tour", id));
  loadTours();
};

/* EDIT */
window.editTour = (id, t, d, img, s, c) => {
  $("docId").value = id;
  $("title").value = t;
  $("description").value = d;
  $("slug").value = s;
  $("category").value = c;

  imageURL = img;

  $("previewImg").src = img;
  $("previewImg").classList.remove("hidden");
  $("noPreview").style.display = "none";
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  location.replace("index.html");
};

loadTours();
</script>

</body>
</html>

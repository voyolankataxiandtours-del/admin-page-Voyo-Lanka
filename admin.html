<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #f3f4f6;
}

.card {
  transition: .4s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 40px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<!-- TOP BAR -->
<header class="bg-black text-white px-6 py-4 flex justify-between items-center">
  <h1 class="font-bold">Tour Admin</h1>
  <button onclick="logout()" class="bg-white text-black px-4 py-1 rounded">
    Logout
  </button>
</header>

<!-- CONTAINER -->
<div class="max-w-6xl mx-auto p-6 grid md:grid-cols-3 gap-6">

<!-- FORM -->
<div class="bg-white p-5 rounded-xl shadow md:col-span-1">

  <h2 class="font-bold text-lg mb-3">Add / Edit Tour</h2>

  <input id="docId" placeholder="Edit ID (optional)" class="border p-2 w-full mb-2">

  <input id="title" placeholder="Title" class="border p-2 w-full mb-2">

  <textarea id="description" placeholder="Description" class="border p-2 w-full mb-2"></textarea>

  <select id="category" class="border p-2 w-full mb-2">
    <option value="Day Tour">Day Tour</option>
    <option value="Round Tour">Round Tour</option>
    <option value="Tailor Made">Tailor Made</option>
  </select>

  <input id="slug" placeholder="Slug" class="border p-2 w-full mb-2">

  <input type="file" id="imageFile" class="mb-2">

  <button onclick="uploadImage()" class="bg-blue-600 text-white w-full py-2 rounded">
    Upload Image
  </button>

  <p id="status" class="text-sm text-green-600 mt-2"></p>

  <button onclick="saveTour()" class="bg-black text-white w-full py-2 rounded mt-3">
    Save Tour
  </button>

</div>

<!-- LIST -->
<div class="md:col-span-2 space-y-4">

  <h2 class="font-bold text-lg">All Tours</h2>

  <div id="list" class="grid md:grid-cols-2 gap-4"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let imageURL = "";

/* LOGIN GUARD */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./index.html";
  }
});

/* CLOUDINARY UPLOAD */
window.uploadImage = async function () {
  const file = imageFile.files[0];
  if (!file) return alert("Select image first");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "tour_upload");

  const res = await fetch("https://api.cloudinary.com/v1_1/dtbxzd7ux/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (!data.secure_url) {
    alert("Upload failed");
    return;
  }

  imageURL = data.secure_url;
  status.innerText = "Image uploaded ✔";
};

/* SAVE */
window.saveTour = async function () {
  const data = {
    title: title.value,
    description: description.value,
    category: category.value,
    slug: slug.value,
    image: imageURL
  };

  if (docId.value) {
    await updateDoc(doc(db, "tour", docId.value), data);
  } else {
    await addDoc(collection(db, "tour"), data);
  }

  loadTours();
};

/* LOAD */
async function loadTours() {
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "tour"));

  snap.forEach(d => {
    const t = d.data();

    const div = document.createElement("div");
    div.className = "card bg-white p-3 rounded-xl shadow";

    div.innerHTML = `
      <img src="${t.image}" class="h-32 w-full object-cover rounded-lg mb-2"/>

      <h3 class="font-bold">${t.title}</h3>
      <p class="text-sm text-gray-500">${t.category}</p>

      <div class="flex gap-2 mt-2">
        <button onclick="editTour('${d.id}', '${t.title}', \`${t.description}\`, '${t.image}', '${t.slug}', '${t.category}')"
        class="bg-blue-500 text-white px-2 rounded">Edit</button>

        <button onclick="deleteTour('${d.id}')"
        class="bg-red-500 text-white px-2 rounded">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
}

window.deleteTour = async (id) => {
  await deleteDoc(doc(db, "tour", id));
  loadTours();
};

window.editTour = (id, t, d, img, s, c) => {
  docId.value = id;
  title.value = t;
  description.value = d;
  slug.value = s;
  category.value = c;
  imageURL = img;
};

window.logout = async () => {
  await signOut(auth);
  window.location.href = "./index.html";
};

loadTours();
</script>

</body>
</html>

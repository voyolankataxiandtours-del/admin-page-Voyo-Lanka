<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: white;
  font-family: system-ui;
}

.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.1);
}

.card {
  transition: .3s ease;
}

.card:hover {
  transform: translateY(-6px);
}
</style>
</head>

<body>

<!-- TOP BAR -->
<header class="flex justify-between items-center px-6 py-4 glass">
  <h1 class="font-bold">Tour Admin Panel</h1>

  <div class="flex gap-2">
    <button onclick="startTutorial()" class="bg-white/10 px-3 py-1 rounded">
      Help
    </button>

    <button onclick="logout()" class="bg-white text-black px-4 py-2 rounded">
      Logout
    </button>
  </div>
</header>

<!-- MAIN -->
<div class="max-w-6xl mx-auto p-6 grid lg:grid-cols-2 gap-6">

<!-- FORM -->
<div class="glass rounded-2xl p-6">

  <h2 class="text-xl font-bold mb-4">Create / Edit Tour</h2>

  <input id="docId" placeholder="Edit ID"
    class="w-full mb-3 p-3 rounded bg-white/10">

  <input id="title" placeholder="Title"
    class="w-full mb-3 p-3 rounded bg-white/10">

  <textarea id="description" placeholder="Description"
    class="w-full mb-3 p-3 rounded bg-white/10"></textarea>

  <select id="category"
    class="w-full mb-3 p-3 rounded bg-white/10 text-black">
    <option value="Day Tour">Day Tour</option>
    <option value="Round Tour">Round Tour</option>
    <option value="Tailor Made">Tailor Made</option>
  </select>

  <input id="slug" placeholder="Slug"
    class="w-full mb-3 p-3 rounded bg-white/10">

  <input type="file" id="imageFile" class="mb-3">

  <button onclick="uploadImage()"
    class="w-full bg-blue-500 py-2 rounded font-bold">
    Upload Image
  </button>

  <p id="status" class="text-green-400 text-sm mt-2"></p>

  <div class="mt-4 h-40 rounded overflow-hidden bg-white/5 flex items-center justify-center">
    <img id="previewImg" class="hidden w-full h-full object-cover"/>
    <p id="noPreview" class="text-white/40">Preview</p>
  </div>

  <button onclick="saveTour()"
    class="w-full mt-4 bg-white text-black py-3 rounded font-bold">
    Save Tour
  </button>

</div>

<!-- LIST -->
<div class="glass rounded-2xl p-6">

  <h2 class="text-xl font-bold mb-4">All Tours</h2>
  <div id="list" class="space-y-3"></div>

</div>

</div>

<!-- TUTORIAL -->
<div id="tutorial" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-white text-black p-6 rounded-2xl max-w-md w-full">
    <h2 class="text-xl font-bold mb-2">Admin Tutorial</h2>

    <p id="tutText" class="text-sm mb-4">
      Welcome to admin panel
    </p>

    <div class="flex justify-between">
      <button onclick="prevTut()">Back</button>
      <button onclick="nextTut()" class="font-bold">Next</button>
    </div>

    <button onclick="closeTut()" class="text-xs mt-3 text-gray-500">
      Skip
    </button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
  authDomain: "voyo-lanka.firebaseapp.com",
  projectId: "voyo-lanka"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let imageURL = "";

/* AUTH FIX */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.replace("./index.html");
  }
});

/* BACK BUTTON LOCK */
window.history.pushState(null, "", location.href);
window.onpopstate = () => {
  window.location.replace("./index.html");
};

/* CLOUDINARY */
window.uploadImage = async function () {
  const file = imageFile.files[0];
  if (!file) return alert("Select image");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "tour_upload");

  const res = await fetch("https://api.cloudinary.com/v1_1/dtbxzd7ux/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (!data.secure_url) return alert("Upload failed");

  imageURL = data.secure_url;

 document.getElementById("status").innerText = "Uploaded ✔";
  previewImg.src = imageURL;
  previewImg.classList.remove("hidden");
  noPreview.style.display = "none";
};

/* SAVE */
window.saveTour = async function () {
  const data = {
    title: title.value,
    description: description.value,
    category: category.value,
    slug: slug.value,
    image: imageURL
  };

  if (docId.value) {
    await updateDoc(doc(db, "tour", docId.value), data);
  } else {
    await addDoc(collection(db, "tour"), data);
  }

  loadTours();
};

/* LOAD */
async function loadTours() {
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "tour"));

  snap.forEach(d => {
    const t = d.data();

    const div = document.createElement("div");
    div.className = "card bg-white/10 p-3 rounded-xl";

    div.innerHTML = `
      <img src="${t.image}" class="h-32 w-full object-cover rounded mb-2"/>

      <b>${t.title}</b>
      <p class="text-sm text-white/60">${t.category}</p>

      <div class="flex gap-2 mt-2">
        <button onclick="editTour('${d.id}', '${t.title}', \`${t.description}\`, '${t.image}', '${t.slug}', '${t.category}')"
        class="bg-blue-500 px-3 py-1 rounded">Edit</button>

        <button onclick="deleteTour('${d.id}')"
        class="bg-red-500 px-3 py-1 rounded">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

window.deleteTour = async (id) => {
  await deleteDoc(doc(db, "tour", id));
  loadTours();
};

window.editTour = (id, t, d, img, s, c) => {
  docId.value = id;
  title.value = t;
  description.value = d;
  slug.value = s;
  category.value = c;

  imageURL = img;
  previewImg.src = img;
  previewImg.classList.remove("hidden");
  noPreview.style.display = "none";
};

window.logout = async () => {
  await signOut(auth);
  window.location.replace("./index.html");
};

loadTours();

/* ---------------- TUTORIAL ---------------- */

let step = 0;
const steps = [
  "Welcome 👋 This is your admin dashboard.",
  "Fill the form to create a tour.",
  "Upload image using Cloudinary.",
  "Save to Firebase database.",
  "Edit or delete anytime from list.",
  "Done 🎉 You are ready!"
];

window.startTutorial = function () {
  step = 0;
  tutorial.classList.remove("hidden");
  updateTut();
};

window.nextTut = function () {
  if (step < steps.length - 1) step++;
  updateTut();
};

window.prevTut = function () {
  if (step > 0) step--;
  updateTut();
};

window.closeTut = function () {
  tutorial.classList.add("hidden");
};

function updateTut() {
  tutText.innerText = steps[step];
}

</script>

</body>
</html>

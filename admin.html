<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: white;
  font-family: system-ui;
}

.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.1);
}

.card {
  transition: .3s ease;
}
.card:hover {
  transform: translateY(-6px);
}

.sidebar {
  width: 240px;
}
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div class="sidebar glass h-screen p-4 hidden md:block">
  <h1 class="text-lg font-bold mb-6">Admin Panel</h1>

  <button onclick="showSection('dashboard')" class="block w-full text-left mb-2">📊 Dashboard</button>
  <button onclick="showSection('tours')" class="block w-full text-left mb-2">🧳 Tours</button>
  <button onclick="startTutorial()" class="block w-full text-left mb-2">❓ Tutorial</button>

  <hr class="my-4 border-white/10"/>

  <button onclick="logout()" class="bg-red-500 w-full py-2 rounded">Logout</button>
</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<!-- TOP BAR -->
<div class="glass flex justify-between items-center p-4 rounded-xl mb-4">
  <h1 class="font-bold">Dashboard</h1>

  <input id="search" oninput="filterTours()" placeholder="Search tours..."
    class="bg-white/10 px-3 py-1 rounded w-40 md:w-64"/>

</div>

<!-- DASHBOARD STATS -->
<div id="dashboardSection">

  <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
    <div class="glass p-4 rounded-xl">
      <h2 class="text-sm opacity-70">Total Tours</h2>
      <p id="totalTours" class="text-2xl font-bold">0</p>
    </div>
  </div>

</div>

<!-- TOURS -->
<div id="toursSection" class="grid md:grid-cols-2 gap-6 hidden">

<!-- FORM -->
<div class="glass p-4 rounded-xl">

  <h2 class="font-bold mb-3">Add / Edit Tour</h2>

  <input id="docId" placeholder="Edit ID" class="w-full mb-2 p-2 bg-white/10 rounded">
  <input id="title" placeholder="Title" class="w-full mb-2 p-2 bg-white/10 rounded">
  <textarea id="description" placeholder="Description" class="w-full mb-2 p-2 bg-white/10 rounded"></textarea>

  <select id="category" class="w-full mb-2 p-2 bg-white/10 text-black rounded">
    <option>Day Tour</option>
    <option>Round Tour</option>
    <option>Tailor Made</option>
  </select>

  <input id="slug" placeholder="Slug" class="w-full mb-2 p-2 bg-white/10 rounded">

  <input type="file" id="imageFile" class="mb-2">

  <button onclick="uploadImage()" class="bg-blue-500 w-full py-2 rounded">
    Upload Image
  </button>

  <p id="status" class="text-green-400 text-sm mt-2"></p>

  <div class="h-40 mt-3 bg-white/5 flex items-center justify-center rounded overflow-hidden">
    <img id="previewImg" class="hidden w-full h-full object-cover"/>
    <span id="noPreview" class="text-white/40">Preview</span>
  </div>

  <button onclick="saveTour()" class="bg-white text-black w-full mt-3 py-2 rounded font-bold">
    Save
  </button>

</div>

<!-- LIST -->
<div id="list" class="space-y-3"></div>

</div>

</div>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-5 right-5 bg-green-500 text-white px-4 py-2 rounded"></div>

<!-- LOADING -->
<div id="loading" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="text-white">Loading...</div>
</div>

<!-- TUTORIAL -->
<div id="tutorial" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-white text-black p-5 rounded-xl w-80">
    <h2 class="font-bold mb-2">Tutorial</h2>
    <p id="tutText">Welcome</p>

    <div class="flex justify-between mt-4">
      <button onclick="prevTut()">Back</button>
      <button onclick="nextTut()">Next</button>
    </div>

    <button onclick="closeTut()" class="text-xs mt-2 text-gray-500">Close</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
  authDomain: "voyo-lanka.firebaseapp.com",
  projectId: "voyo-lanka"
});

const db = getFirestore(app);
const auth = getAuth(app);

let imageURL = "";

/* AUTH */
onAuthStateChanged(auth, user => {
  if (!user) location.replace("index.html");
});

/* BACK BUTTON BLOCK */
history.pushState(null, "", location.href);
onpopstate = () => location.replace("index.html");

/* TOAST */
function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 2000);
}

/* LOADING */
function setLoading(v){
  document.getElementById("loading").classList.toggle("hidden", !v);
}

/* CLOUDINARY */
window.uploadImage = async () => {
  const file = imageFile.files[0];
  if (!file) return;

  setLoading(true);

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "tour_upload");

  const res = await fetch("https://api.cloudinary.com/v1_1/dtbxzd7ux/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  setLoading(false);

  if (!data.secure_url) return toast("Upload failed");

  imageURL = data.secure_url;
  document.getElementById("status").innerText = "Uploaded ✔";
  previewImg.src = imageURL;
  previewImg.classList.remove("hidden");
  noPreview.style.display = "none";

  toast("Image uploaded");
};

/* SAVE */
window.saveTour = async () => {
  setLoading(true);

  const data = {
    title: title.value,
    description: description.value,
    category: category.value,
    slug: slug.value,
    image: imageURL
  };

  if (docId.value) {
    await updateDoc(doc(db,"tour",docId.value),data);
  } else {
    await addDoc(collection(db,"tour"),data);
  }

  setLoading(false);
  toast("Saved!");
  loadTours();
};

/* LOAD */
async function loadTours(){
  list.innerHTML="";
  const snap = await getDocs(collection(db,"tour"));

  totalTours.innerText = snap.size;

  snap.forEach(d=>{
    const t=d.data();

    const div=document.createElement("div");
    div.className="glass p-3 rounded-xl";

    div.innerHTML=`
      <img src="${t.image}" class="h-32 w-full object-cover rounded mb-2"/>
      <b>${t.title}</b>
      <p class="text-sm opacity-70">${t.category}</p>

      <div class="flex gap-2 mt-2">
        <button onclick="editTour('${d.id}','${t.title}','${t.description}','${t.image}','${t.slug}','${t.category}')"
        class="bg-blue-500 px-3 py-1 rounded">Edit</button>

        <button onclick="deleteTour('${d.id}')"
        class="bg-red-500 px-3 py-1 rounded">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
}

window.deleteTour = async (id)=>{
  await deleteDoc(doc(db,"tour",id));
  toast("Deleted");
  loadTours();
};

window.editTour=(id,t,d,img,s,c)=>{
  docId.value=id;
  title.value=t;
  description.value=d;
  slug.value=s;
  category.value=c;
  imageURL=img;
};

window.logout=async()=>{
  await signOut(auth);
  location.replace("index.html");
};

/* NAV */
window.showSection = (s)=>{
  dashboardSection.classList.toggle("hidden", s!=="dashboard");
  toursSection.classList.toggle("hidden", s!=="tours");
};

/* INIT */
showSection("dashboard");
loadTours();

/* TUTORIAL */
let step=0;
const steps=[
"Create tour here",
"Upload image",
"Save to database",
"Edit anytime",
"Done"
];

window.startTutorial=()=>{
  tutorial.classList.remove("hidden");
  step=0;
  tutText.innerText=steps[0];
};

window.nextTut=()=>{
  if(step<steps.length-1) step++;
  tutText.innerText=steps[step];
};

window.prevTut=()=>{
  if(step>0) step--;
  tutText.innerText=steps[step];
};

window.closeTut=()=>{
  tutorial.classList.add("hidden");
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D&D Tours Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:radial-gradient(circle at top,#111,#000);
color:white;
font-family:system-ui;
}

.glass{
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
}

.card{
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body class="flex">

<!-- SIDEBAR -->

<div class="w-60 h-screen glass p-5 hidden md:block">

<h1 class="text-xl font-bold mb-8">
D&D Tours
</h1>

<button onclick="showSection('dashboard')" class="block w-full text-left mb-3">
📊 Dashboard
</button>

<button onclick="showSection('tours')" class="block w-full text-left mb-3">
🧳 Tours
</button>

<button onclick="newTour()" class="block w-full text-left mb-3 text-green-400">
➕ Add Tour
</button>

<button onclick="showSection('bookings')" class="block w-full text-left mb-3">
📅 Customer Bookings
</button>

<hr class="border-white/10 my-5">

<button onclick="logout()" class="bg-red-600 w-full py-2 rounded-xl">
Logout
</button>

</div>

<!-- MAIN -->

<div class="flex-1 p-6">

<div class="glass rounded-xl p-5 flex justify-between items-center mb-6">

<h1 class="text-2xl font-bold">
Admin Dashboard
</h1>

<button
onclick="newTour()"
class="bg-green-600 px-4 py-2 rounded-xl">
+ Add Tour
</button>

</div>

<!-- DASHBOARD -->

<div id="dashboardSection">

<div class="glass rounded-xl p-5 w-56 mb-6">

<p class="text-white/60">
Total Tours
</p>

<h2 id="totalTours" class="text-4xl font-black mt-2">
0
</h2>

</div>

<h2 class="font-bold text-xl mb-4">
Recent Tours
</h2>

<div
id="recentTours"
class="grid md:grid-cols-3 gap-4">
</div>

</div>

<!-- BOOKINGS -->

<div
id="bookingsSection"
class="hidden">

<h2 class="text-3xl font-black mb-6">
💳 Payment Approval Queue
</h2>
  
<div
id="bookingList"
class="space-y-5">

Loading...

</div>

</div>

<!-- TOURS -->

<div
id="toursSection"
class="hidden grid md:grid-cols-2 gap-6">

<!-- FORM -->

<div class="glass rounded-xl p-5">

<h2 class="text-xl font-bold mb-4">
Add / Edit Tour
</h2>

<input
id="docId"
placeholder="Document ID"
class="w-full mb-3 p-3 rounded bg-white/10">

<input
id="title"
placeholder="Tour Title"
class="w-full mb-3 p-3 rounded bg-white/10">

<textarea
id="description"
placeholder="Description"
class="w-full mb-3 p-3 rounded bg-white/10"></textarea>

<select
id="category"
class="w-full mb-3 p-3 rounded text-black">

<option>Day Tour</option>
<option>Round Tour</option>
<option>Tailor Made</option>

</select>

<input
id="price"
type="number"
placeholder="Price USD"
class="w-full mb-3 p-3 rounded bg-white/10">

<input
id="slug"
placeholder="Slug"
class="w-full mb-3 p-3 rounded bg-white/10">

<input
id="area"
placeholder="Area"
class="w-full mb-3 p-3 rounded bg-white/10">

<select
id="tourType"
class="w-full mb-3 p-3 rounded text-black">

<option value="single">
Single Area Tour
</option>

<option value="route">
Route Tour
</option>

</select>

<input
id="routeFrom"
placeholder="Route From"
class="w-full mb-3 p-3 rounded bg-white/10">

<input
id="routeTo"
placeholder="Route To"
class="w-full mb-3 p-3 rounded bg-white/10">

<input
type="file"
id="imageFile"
class="mb-4">

<button
onclick="uploadImage()"
class="bg-blue-600 w-full py-3 rounded-xl">

Upload Image

</button>

<p
id="status"
class="text-green-400 mt-3">
</p>

<div
class="h-44 mt-5 rounded-xl bg-white/5 flex justify-center items-center overflow-hidden">

<img
id="previewImg"
class="hidden w-full h-full object-cover">

<span id="noPreview">
Image Preview
</span>

</div>

<button
onclick="saveTour()"
class="bg-white text-black font-bold w-full py-3 rounded-xl mt-5">

Save Tour

</button>

</div>

<!-- TOUR LIST -->

<div
id="list"
class="space-y-4">

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
getDoc,
deleteDoc,
doc,
setDoc,

query,
orderBy,
updateDoc,
where

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

getAuth,
signOut,
onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app=initializeApp({

apiKey:"AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
authDomain:"voyo-lanka.firebaseapp.com",
projectId:"voyo-lanka"

});

  emailjs.init("2zzy0wtyn_4qdRVf_");

const db=getFirestore(app);
const auth=getAuth(app);

let imageURL="";

const $=(id)=>document.getElementById(id);

onAuthStateChanged(auth,user=>{

if(!user){

location.replace("index.html");

}

});

history.pushState(null,"",location.href);

onpopstate=()=>location.replace("index.html");

  /* RESET FORM */

window.newTour=()=>{

$("docId").value="";
$("title").value="";
$("description").value="";
$("category").value="Day Tour";
$("price").value="";
$("slug").value="";
$("area").value="";
$("routeFrom").value="";
$("routeTo").value="";
$("tourType").value="single";

imageURL="";

$("status").innerText="";

$("previewImg").classList.add("hidden");
$("noPreview").style.display="block";

};

/* CLOUDINARY */

window.uploadImage=async()=>{

const file=$("imageFile").files[0];

if(!file){
alert("Select an image.");
return;
}

const fd=new FormData();

fd.append("file",file);
fd.append("upload_preset","tour_upload");

try{

const res=await fetch(
"https://api.cloudinary.com/v1_1/dtbxzd7ux/image/upload",
{
method:"POST",
body:fd
});

const data=await res.json();

imageURL=data.secure_url;

$("previewImg").src=imageURL;
$("previewImg").classList.remove("hidden");
$("noPreview").style.display="none";

$("status").innerText="Image Uploaded ✔";

}catch(e){

alert("Upload failed.");

}

};

/* SAVE TOUR */

window.saveTour=async()=>{

const data={

title:$("title").value,
description:$("description").value,
category:$("category").value,
price:Number($("price").value),

slug:$("slug").value,

image:imageURL,

area:$("area").value,

tourType:$("tourType").value,
routeFrom:$("routeFrom").value,
routeTo:$("routeTo").value

};

const id=$("docId").value;

try{

if(id){

await setDoc(
doc(db,"tour",id),
data,
{merge:true}
);

}else{

await addDoc(
collection(db,"tour"),
data
);

}

newTour();

loadTours();

}catch(e){

console.error(e);

alert("Save failed");

}

};

/* LOAD TOURS */

async function loadTours(){

list.innerHTML="";

const snap=await getDocs(collection(db,"tour"));

const tours=[];

snap.forEach(d=>{

tours.push({

id:d.id,

...d.data()

});

});

totalTours.innerText=tours.length;

recentTours.innerHTML="";

tours.slice(-6).reverse().forEach(t=>{

recentTours.innerHTML+=`

<div class="glass p-3 rounded-xl">

<img
src="${t.image||""}"
class="h-28 w-full object-cover rounded mb-3">

<b>${t.title}</b>

<p class="text-sm text-white/60">

${t.category}

</p>

</div>

`;

});

tours.reverse().forEach(t=>{

list.innerHTML+=`

<div class="glass p-4 rounded-xl">

<img
src="${t.image||""}"
class="w-full h-40 rounded object-cover">

<h2 class="font-bold mt-3">

${t.title}

</h2>

<p class="text-white/60">

$${t.price}

</p>

<div class="flex gap-3 mt-4">

<button
class="bg-blue-600 px-4 py-2 rounded"
onclick='editTour(
"${t.id}",
"${encodeURIComponent(t.title||"")}",
"${encodeURIComponent(t.description||"")}",
"${t.image||""}",
"${t.slug||""}",
"${t.category||""}",
"${t.price||0}"
)'>

Edit

</button>

<button
class="bg-red-600 px-4 py-2 rounded"
onclick="deleteTour('${t.id}')">

Delete

</button>

</div>

</div>

`;

});

}

  /* DELETE TOUR */

window.deleteTour = async(id)=>{

if(!confirm("Delete this tour?")) return;

await deleteDoc(doc(db,"tour",id));

loadTours();

};

/* EDIT TOUR */

window.editTour=(id,title,description,image,slug,category,price)=>{

$("docId").value=id;
$("title").value=decodeURIComponent(title);
$("description").value=decodeURIComponent(description);

$("slug").value=slug;
$("category").value=category;
$("price").value=price;

imageURL=image;

if(image){

$("previewImg").src=image;
$("previewImg").classList.remove("hidden");
$("noPreview").style.display="none";

}

showSection("tours");

};

/* LOAD BOOKINGS */

async function loadBookings(){

const bookingList=$("bookingList");

bookingList.innerHTML="Loading...";

try{

const q = query(
    collection(db,"payments"),
    where("status","==","Pending Approval"),
    orderBy("createdAt","desc")
);
  
const snap=await getDocs(q);

bookingList.innerHTML="";

if(snap.empty){

bookingList.innerHTML=`
<div class="glass p-6 rounded-xl">
No booking requests yet.
</div>
`;

return;

}

snap.forEach(docSnap=>{

const p = docSnap.data();

bookingList.innerHTML += `

<div class="glass rounded-2xl p-6">

<div class="flex justify-between items-start">

<div>

<h2 class="text-2xl font-bold">
${p.name}
</h2>

<p class="text-white/60 mt-1">
Reference:
<b>${p.bookingReference || p.bookingID}</b>
</p>

<p class="mt-3">
🧳 ${p.tour}
</p>

<p>
📧 ${p.email}
</p>

<p>
💰 $${p.amount}
</p>

<p>
💳 ${p.paymentMethod}
</p>

<p>
📅 ${p.travelDate || "-"}
</p>

</div>

<div>

<span class="bg-yellow-500 text-black px-4 py-2 rounded-xl">

${p.status}

</span>

</div>

</div>

<div class="flex flex-wrap gap-3 mt-6">

<button
onclick="viewReceipt('${p.receiptURL}')"
class="bg-blue-600 px-5 py-2 rounded-xl">

👁 View Receipt

</button>

<button
onclick="approvePayment('${docSnap.id}')"
class="bg-green-600 px-5 py-2 rounded-xl">

✅ Approve

</button>

<button
onclick="rejectPayment('${docSnap.id}')"
class="bg-red-600 px-5 py-2 rounded-xl">

❌ Reject

</button>

</div>

</div>

`;

});
  

}catch(err){

console.error("LOAD BOOKINGS ERROR:", err);

alert(err.message);

bookingList.innerHTML = err.message;

}

}


window.viewReceipt = function(url){
    window.open(url, "_blank");
}
window.approvePayment = async(id)=>{

try{

// Read payment document
const paymentRef = doc(db,"payments",id);

const paymentSnap = await getDoc(paymentRef);

if(!paymentSnap.exists()){

alert("Payment not found.");

return;

}

const payment = paymentSnap.data();


// Create booking

await setDoc(

doc(db,"bookings",id),

{

...payment,

status:"Confirmed",

paymentStatus:"Paid",

  paymentApproved:true,

approvedAt:new Date()

}

);


// Update payment status

await updateDoc(

paymentRef,

{

status:"Approved",
  
approvedAt:new Date(),
  bookingCreated:new Date()

}

);

  await emailjs.send(
"service_i35yoq6",
"template_qkbxxvs",
{
    name: payment.name,
    email: payment.email,
    bookingReference: payment.bookingReference || payment.bookingID,
    tour: payment.tour,
    travelDate: payment.travelDate,
    amount: payment.amount,
    year: new Date().getFullYear()
});

alert("✅ Booking confirmed successfully.");

loadBookings();

}catch(err){

console.error(err);

alert("Approval failed.");

}

};


  window.rejectPayment = async(id)=>{

const reason = prompt(
"Why are you rejecting this payment?"
);

if(reason===null) return;

if(reason.trim()===""){

alert("Please enter a reason.");

return;

}

try{

const paymentRef = doc(db,"payments",id);

const paymentSnap = await getDoc(paymentRef);

if(!paymentSnap.exists()){

    alert("Payment not found.");

    return;

}

const payment = paymentSnap.data();

await updateDoc(paymentRef,{

    status:"Rejected",

    rejectionReason:reason,

    rejectedAt:new Date()

});


await emailjs.send(
"service_i35yoq6",
"template_hkj5bt3",
{
    name: payment.name,
    email: payment.email,
    bookingReference: payment.bookingReference || payment.bookingID,
    tour: payment.tour,
    travelDate: payment.travelDate,
    amount: payment.amount,
    reason: reason,
    year: new Date().getFullYear()
});

// Send email
alert("❌ Payment rejected.");

loadBookings();

}catch(err){

console.error(err);

alert("Failed.");

}

}
/* SHOW SECTIONS */

window.showSection=(section)=>{

$("dashboardSection").classList.add("hidden");
$("toursSection").classList.add("hidden");
$("bookingsSection").classList.add("hidden");

if(section==="dashboard"){

$("dashboardSection").classList.remove("hidden");

}

if(section==="tours"){

$("toursSection").classList.remove("hidden");

}

if(section==="bookings"){

$("bookingsSection").classList.remove("hidden");

loadBookings();

}

};

/* LOGOUT */

window.logout=async()=>{

await signOut(auth);

location.replace("index.html");

};

/* INITIAL LOAD */

loadTours();

</script>

</body>
</html>

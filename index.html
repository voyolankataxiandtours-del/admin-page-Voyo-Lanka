<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #111, #000);
}

.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.1);
}

.fade {
  animation: fadeIn .6s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md glass rounded-2xl p-8 shadow-2xl fade">

  <!-- TITLE -->
  <h1 class="text-2xl font-bold text-center">Admin Login</h1>
  <p class="text-center text-white/60 text-sm mt-2">
    Secure access to tour dashboard
  </p>

  <!-- EMAIL -->
  <div class="mt-6">
    <label class="text-sm text-white/70">Email</label>
    <input id="email" type="email"
      class="w-full mt-1 p-3 rounded-lg bg-white/10 border border-white/10 outline-none focus:border-white/40"
      placeholder="admin@email.com">
  </div>

  <!-- PASSWORD -->
  <div class="mt-4 relative">
    <label class="text-sm text-white/70">Password</label>

    <input id="password" type="password"
      class="w-full mt-1 p-3 rounded-lg bg-white/10 border border-white/10 outline-none focus:border-white/40"
      placeholder="••••••••">

    <button onclick="togglePass()"
      class="absolute right-3 top-9 text-xs text-white/60 hover:text-white">
      Show
    </button>
  </div>

  <!-- LOGIN BUTTON -->
  <button onclick="login()"
    class="w-full mt-6 bg-white text-black font-bold py-3 rounded-lg hover:opacity-90 transition">
    Login
  </button>

  <p id="status" class="text-center text-sm mt-4 text-red-400"></p>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const status = document.getElementById("status");

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "./admin.html";
  } catch (err) {
    status.innerText = "Invalid email or password";
  }
};

/* SHOW / HIDE PASSWORD */
window.togglePass = function () {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-80">
  <h2 class="text-xl font-bold mb-4">Admin Login</h2>

  <input id="email" class="w-full border p-2 mb-2" placeholder="Email">
  <input id="password" type="password" class="w-full border p-2 mb-4" placeholder="Password">

  <button onclick="login()" class="w-full bg-black text-white py-2 rounded">
    Login
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
    authDomain: "voyo-lanka.firebaseapp.com",
    projectId: "voyo-lanka"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function () {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    window.location.href = "admin.html";
  } catch (e) {
    alert("Login failed");
  }
};
</script>

</body>
</html>
